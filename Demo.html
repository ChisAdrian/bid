<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bid v1.0 — Quick Demo</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-dim: #0ea5e9;
            --danger: #ef4444;
            --radius: 8px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .card h2 {
            font-size: 1rem;
            margin: 0 0 0.75rem 0;
            color: var(--accent);
        }
        input, button {
            background: var(--bg);
            border: 1px solid #334155;
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
        }
        input:focus, button:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover { background: #334155; }
        button:active { transform: scale(0.97); }
        button.primary {
            background: var(--accent-dim);
            border-color: var(--accent-dim);
            color: #fff;
        }
        button.primary:hover { background: var(--accent); }
        button.danger {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
        }
        .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent-dim);
            color: #fff;
        }
        .muted { color: var(--muted); font-size: 0.8rem; }
        .todo-list { list-style: none; padding: 0; margin: 0; }
        .todo-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #334155;
        }
        .todo-list li:last-child { border-bottom: none; }
        .todo-list li.done span { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

<h1>bid v1.0</h1>
<p class="subtitle">Quick demo — counter, computed, list binding</p>

<!-- 1. COUNTER -->
<div class="card">
    <h2>1. Counter</h2>
    <div class="row">
        <button bid="dec">−</button>
        <span bid="count" class="badge" style="font-size:1rem; padding:0.35rem 1rem;">0</span>
        <button bid="inc" class="primary">+</button>
    </div>
    <p class="muted">Clicks: <span bid="clicks">0</span> | Doubled: <span bid="doubled">0</span></p>
</div>

<!-- 2. COMPUTED -->
<div class="card">
    <h2>2. Computed</h2>
    <div class="row">
        <input bid="first" placeholder="First name" style="flex:1">
        <input bid="last" placeholder="Last name" style="flex:1">
    </div>
    <p class="muted">Full name: <strong bid="fullname">... ...</strong></p>
</div>

<!-- 3. LIST BINDING -->
<div class="card">
    <h2>3. Todo List (Keyed)</h2>
    <div class="row">
        <input bid="todo-input" placeholder="New task..." style="flex:1">
        <button bid="add-btn" class="primary">Add</button>
    </div>
    <ul bid="todo-list" class="todo-list"></ul>
</div>

<!-- 4. CLEANUP -->
<div class="card">
    <h2>4. Cleanup</h2>
    <div class="row">
        <button bid="spawn-btn">Spawn</button>
        <button bid="destroy-btn" class="danger">Destroy</button>
    </div>
    <div id="widget-box" style="margin-top:0.75rem;"></div>
</div>

<script src="https://cdn.jsdelivr.net/gh/ChisAdrian/bid@main/bid.js"></script>
<script>
    const { signal, computed, bindText, bindValue, bindClick, bindList, bindClass, unbind } = bid;

    // === 1. COUNTER ===
    const count = signal(0);
    const clicks = signal(0);
    const doubled = computed([count], () => count.peek() * 2);

    bindText('count', count);
    bindText('clicks', clicks);
    bindText('doubled', doubled);

    bindClick('inc', () => { count.value++; clicks.value++; });
    bindClick('dec', () => { count.value--; clicks.value++; });

    // === 2. COMPUTED ===
    const firstName = signal('');
    const lastName = signal('');
    const fullName = computed([firstName, lastName], () => {
        const f = firstName.peek(), l = lastName.peek();
        return (f || '...') + ' ' + (l || '...');
    });

    bindValue('first', firstName);
    bindValue('last', lastName);
    bindText('fullname', fullName);

    // === 3. TODO LIST ===
    const todoText = signal('');
    let todoId = 1;
    const todos = signal([]);

    bindValue('todo-input', todoText);

    bindList('todo-list', todos, (item, index, existing) => {
        if (existing) {
            existing.querySelector('span').textContent = item.text;
            existing.querySelector('input').checked = item.done;
            existing.classList.toggle('done', item.done);
            return existing;
        }
        const li = document.createElement('li');
        li.className = item.done ? 'done' : '';
        li.innerHTML = `
            <input type="checkbox" ${item.done ? 'checked' : ''}>
            <span style="flex:1">${item.text}</span>
            <button style="background:transparent;border:none;color:var(--danger);cursor:pointer;">×</button>
        `;
        const cb = li.querySelector('input');
        const del = li.querySelector('button');
        cb.addEventListener('change', () => {
            todos.value = todos.value.map(t => t.id === item.id ? { ...t, done: cb.checked } : t);
        });
        del.addEventListener('click', () => {
            todos.value = todos.value.filter(t => t.id !== item.id);
        });
        return li;
    }, { keyFn: item => item.id });

    bindClick('add-btn', () => {
        const text = todoText.value.trim();
        if (!text) return;
        todos.value = [...todos.value, { id: todoId++, text, done: false }];
        todoText.value = '';
    });

    // === 4. CLEANUP ===
    let widgetCount = 0;
    bindClick('spawn-btn', () => {
        widgetCount++;
        const div = document.createElement('div');
        div.id = 'w-' + widgetCount;
        div.className = 'row';
        div.style.cssText = 'background:var(--bg);padding:0.5rem;border-radius:var(--radius);margin-bottom:0.5rem;';
        div.innerHTML = `
            <span>Widget #${widgetCount}</span>
            <input bid="w-${widgetCount}-in" placeholder="Type..." style="flex:1">
            <span bid="w-${widgetCount}-out" class="badge">...</span>
        `;
        document.getElementById('widget-box').appendChild(div);

        const ws = signal('');
        bindValue('w-' + widgetCount + '-in', ws);
        bindText('w-' + widgetCount + '-out', ws, v => v || '...');
    });

    bindClick('destroy-btn', () => {
        const box = document.getElementById('widget-box');
        const last = box.lastElementChild;
        if (!last) return;
        unbind('#' + last.id);
        last.remove();
    });
</script>

</body>
</html>
